name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Format check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Unformatted files:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./pkg/... ./tests/...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build binary
        run: go build -v -o simgo cmd/simgo/main.go

      - name: Compile core examples
        run: |
          for example in p2pk htlc atomic_swap covenant multisig vault oracle_price relative_timelock taproot_key_spend; do
            ./simgo -input examples/${example}.go -output /tmp/${example}.shl
            echo "✓ ${example}.go compiled"
          done

      - name: Validate generated SimplicityHL
        run: |
          for file in /tmp/*.shl; do
            if grep -q "mod witness" "$file" && grep -q "mod param" "$file" && grep -q "fn main" "$file"; then
              echo "✓ $(basename $file) is valid SimplicityHL"
            else
              echo "✗ $(basename $file) failed validation"
              cat "$file"
              exit 1
            fi
          done

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: simgo-linux-amd64
          path: simgo

  release:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build release binaries
        run: |
          mkdir -p release
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags="-w -s" -o release/simgo-linux-amd64   cmd/simgo/main.go
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags="-w -s" -o release/simgo-linux-arm64   cmd/simgo/main.go
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags="-w -s" -o release/simgo-darwin-amd64  cmd/simgo/main.go
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags="-w -s" -o release/simgo-darwin-arm64  cmd/simgo/main.go
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-w -s" -o release/simgo-windows-amd64.exe cmd/simgo/main.go

      - name: Smoke-test Linux binary
        run: |
          ./release/simgo-linux-amd64 -input examples/p2pk.go -output /tmp/p2pk.shl
          echo "✓ Linux binary works"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
