run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters-settings:
  gocyclo:
    min-complexity: 20

  goconst:
    min-len: 3
    min-occurrences: 3

  lll:
    line-length: 140

  misspell:
    locale: US

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - dupImport
      - ifElseChain
      - wrapperFunc

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gofmt
    - goimports
    - misspell
    - lll
    - goconst
    - gocyclo
    - gocritic
    - unconvert
    - nolintlint
    - whitespace

issues:
  exclude-rules:
    # Test files: relax length and duplication rules
    - path: _test\.go
      linters:
        - lll
        - goconst

    # Examples: allow magic numbers and long lines
    - path: examples/
      linters:
        - lll
        - goconst
        - errcheck

    # Transpiler: complex functions are inherent to AST walking
    - path: pkg/transpiler/
      linters:
        - gocyclo

  max-issues-per-linter: 50
  max-same-issues: 10
